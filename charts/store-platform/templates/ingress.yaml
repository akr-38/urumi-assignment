apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: store-platform-ingress
  annotations:
    # Anti-Bot Rate Limiting (Note: These are Nginx-specific, Traefik uses Middlewares)
    # We keep them for portability, but the ingress class is now configurable.
    nginx.ingress.kubernetes.io/limit-rps: "2"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "5"
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  rules:
  - host: "api.{{ .Values.publicIp }}.nip.io"
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 8000
  - host: "app.{{ .Values.publicIp }}.nip.io"
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80
  - host: "platform.{{ .Values.publicIp }}.nip.io"
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80
