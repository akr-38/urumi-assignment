# Default values for store-platform.
# This is a YAML-formatted file.

publicIp: "127.0.0.1"
ingress:
  className: "traefik" # Use "traefik" for K3s/EC2, "nginx" for others

# Secrets (In production, these should be passed via --set or a secrets file)
secrets:
  postgresPassword: "password"
  wordpressPassword: "admin123"
  mariadbRootPassword: "root123"
  mariadbPassword: "wp123"

# Common settings
namespace: store-platform

# Backend settings
backend:
  replicaCount: 1
  image:
    repository: ayushakr38/urumi-backend
    tag: latest
    pullPolicy: Always
  service:
    port: 8000
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70

# Worker settings
worker:
  replicaCount: 1
  image:
    repository: ayushakr38/urumi-worker
    tag: latest
    pullPolicy: Always
  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 200m
      memory: 512Mi
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 80

# Frontend settings
frontend:
  replicaCount: 1
  image:
    repository: ayushakr38/urumi-frontend
    tag: latest
    pullPolicy: Always
  service:
    port: 80

# Infrastructure
postgres:
  storage: 2Gi
redis:
  storage: 1Gi
